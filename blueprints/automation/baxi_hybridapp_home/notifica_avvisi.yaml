blueprint:
  name: Baxi — Notifica push avvisi
  description: >
    Invia una notifica push all'app Home Assistant quando viene rilevato un
    nuovo avviso Baxi (FAILURE o WARNING).
    Richiede l'integrazione baxi_hybridapp_home ≥ 0.5.0.
  domain: automation
  source_url: https://github.com/Cm-8/baxi_hybridapp_home/blob/main/blueprints/automation/baxi_hybridapp_home/notifica_avvisi.yaml
  input:
    notify_device:
      name: Dispositivo mobile
      description: >
        Seleziona il dispositivo su cui inviare la notifica
        (deve avere l'app Home Assistant installata).
      selector:
        device:
          integration: mobile_app
    severity_filter:
      name: Severità da notificare
      description: Filtra gli avvisi per tipo.
      default: "both"
      selector:
        select:
          options:
            - label: "Solo FAILURE (errori critici)"
              value: "FAILURE"
            - label: "Solo WARNING (avvisi)"
              value: "WARNING"
            - label: "Entrambi"
              value: "both"

variables:
  severity_filter: !input severity_filter

triggers:
  - trigger: event
    event_type: baxi_hybridapp_alert

conditions:
  - condition: template
    value_template: >
      {{ severity_filter == 'both'
         or trigger.event.data.severity == severity_filter }}

actions:
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: >
      {% if trigger.event.data.severity == 'FAILURE' %}
        🔴 Baxi — Errore
      {% else %}
        🟡 Baxi — Avviso
      {% endif %}
    message: >
      {% set code = trigger.event.data.code | default('') %}
      {% set desc = trigger.event.data.description
                    or trigger.event.data.title
                    or 'Nuovo avviso' %}
      {% if code %}{{ code }} — {% endif %}{{ desc }}

mode: queued
max: 5
